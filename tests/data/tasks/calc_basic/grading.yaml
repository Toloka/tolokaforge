combine:
  method: weighted
  weights:
    state_checks: 0.6
    transcript_rules: 0.4
  pass_threshold: 0.7

state_checks:
  jsonpaths: []
  files:
    - path: result.txt
      must_exist: true
      must_contain: "391"

transcript_rules:
  tool_expectations:
    required_tools:
      - write_file
    disallowed_tools: []
  
  max_turns: 10
  
  must_contain_phrases:
    - "391"
  
  disallow_regex: []

llm_judge: null