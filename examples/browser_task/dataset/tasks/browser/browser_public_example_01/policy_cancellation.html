    <h1>Cancellation Policy</h1>
    <p>Standard consumer orders: cancel within 48 hours of placement.</p>
    <p>Enterprise managed orders: cancellation is allowed only while fulfillment status is <strong>queued</strong>.</p>
    <p>Once status is <strong>scheduled</strong> or later, cancellation is not permitted and refund workflow must be used.</p>
