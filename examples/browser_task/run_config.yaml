# Browser task example — requires Docker and a real LLM provider.
# Docker services auto-start via orchestrator (auto_start_services: true).
# Requires OPENROUTER_API_KEY in .env.
models:
  agent:
    provider: "openrouter"
    name: "anthropic/claude-sonnet-4-6"
    temperature: 0.0
    max_tokens: 4096
  user:
    provider: "openrouter"
    name: "anthropic/claude-sonnet-4-6"
    temperature: 0.2

orchestrator:
  workers: 1
  repeats: 1
  max_turns: 10
  queue_backend: sqlite

evaluation:
  task_packs:
    - "examples/browser_task/dataset"
  tasks_glob: "**/task.yaml"
  output_dir: "results/browser_task"
