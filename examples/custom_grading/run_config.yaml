# Custom grading example — weighted scoring with state checks, transcript rules, and LLM judge.
# Requires OPENROUTER_API_KEY in .env.
models:
  agent:
    provider: "openrouter"
    name: "anthropic/claude-sonnet-4-6"
    temperature: 0.0
  user:
    provider: "openrouter"
    name: "anthropic/claude-sonnet-4-6"
    temperature: 0.0

orchestrator:
  workers: 1
  repeats: 1
  max_turns: 8
  queue_backend: sqlite

evaluation:
  task_packs:
    - "examples/custom_grading/dataset"
  tasks_glob: "**/task.yaml"
  output_dir: "results/custom_grading"
