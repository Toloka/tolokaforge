name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

# Cancel in-progress reviews for the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Run on PR events, or on @claude mentions in comments
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are reviewing a PR for Tolokaforge — an LLM tool-use benchmarking harness.
            Read AGENTS.md for full project rules before reviewing.

            Review the PR diff for:

            ## Code Quality
            - Errors surfaced explicitly — no silent fallbacks, no swallowed exceptions
            - Fail fast: prefer explicit failures over defaults that mask problems
            - DRY: no duplicated logic — common code belongs in shared modules
            - Functions under 100 lines, no god classes, nesting depth < 3
            - Self-describing code: names communicate intent, minimal comments needed
            - No warnings suppressed — update code to use current APIs instead

            ## Architecture
            - Harness logic stays generic — task-specific logic in task packs only
            - Clean abstraction boundaries — no implementation details leaking across layers
            - Backward compatibility preserved for task contracts unless migration is explicit
            - Deterministic grading preferred over LLM judge when feasible
            - Secrets via SecretManager only — never os.environ.get() or load_dotenv() for API keys

            ## Testing
            - Every new/changed test has a marker: @pytest.mark.unit, .canonical, or .integration
            - Tests verify behavior, not implementation — mocks only for external deps
            - Zero xfail, zero bare @skip — use conditional markers (requires_api, requires_docker)
            - MockAsyncClient imported from tests.utils.mock_clients — no local copies
            - Shared fixtures from conftest.py — no duplication
            - Canonical snapshot changes are intentional regressions until proven otherwise

            ## Security
            - No secrets in code, logs, or container mounts
            - Docker containers: cap_drop ALL, no-new-privileges, internal networks
            - Tool arguments validated against JSON schemas
            - Only needed secret keys injected into containers (not all available)

            ## Repository Hygiene
            - No scripts, data, temp files, or logs in repo root
            - Docs updated when user-facing behavior changes
            - No speculative future features in docs — only actual information

            Be concise. Focus on issues, not praise. Suggest specific fixes when possible.
