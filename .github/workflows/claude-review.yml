name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-progress reviews for the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for violations of the project's AGENTS.md rules. Check:

            1. CODE QUALITY: Are errors surfaced explicitly? No silent fallbacks,
               no swallowed exceptions (except Exception: pass), no returning None
               instead of raising. Functions under 100 lines, nesting depth < 3.

            2. SECRETS: Are API keys accessed via SecretManager only? Never
               os.environ.get() or load_dotenv() for API keys. No secrets in code,
               logs, or container mounts.

            3. TESTING: Does every test file have pytestmark (pytest.mark.unit,
               .canonical, or .integration)? Zero xfail, zero bare @skip — use
               conditional markers (requires_api, requires_docker). MockAsyncClient
               from tests.utils.mock_clients only — no local copies.

            4. ARCHITECTURE: Is harness logic generic? Task-specific logic in task
               packs only. Clean abstraction boundaries. Backward compatibility
               preserved for task contracts.

            5. REPOSITORY HYGIENE: No scripts, data, temp files, or logs in repo
               root. Docs updated when user-facing behavior changes.

            6. CODE STANDARDS: DRY — no duplicated logic. Self-describing code.
               Early returns to minimize nesting. No warnings suppressed.

            If violations are found, list them clearly with file paths, line numbers, and suggested fixes.
            If no violations, confirm the PR passes all checks.
