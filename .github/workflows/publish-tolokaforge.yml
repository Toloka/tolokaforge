name: Publish tolokaforge to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      stub:
        description: "Publish a minimal stub package (v0.0.1) to reserve the name"
        required: false
        type: boolean
        default: false

# Cancel in-progress runs for the same tag
concurrency:
  group: publish-tolokaforge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.12

      - name: Prepare stub package
        if: github.event.inputs.stub == 'true'
        run: |
          # Replace repo source with a minimal placeholder package
          rm -rf tolokaforge
          mkdir -p tolokaforge

          cat > README.md << 'README_EOF'
          # Tolokaforge

          > **This is a placeholder release.** The full package is coming soon.

          A benchmarking harness for evaluating tool-using LLM agents.

          For more information, visit [github.com/Toloka/tolokaforge](https://github.com/Toloka/tolokaforge).
          README_EOF

          cat > tolokaforge/__init__.py << 'STUB_EOF'
          """Tolokaforge - LLM Tool-Use Benchmarking Harness.

          This is a placeholder package. The full release is coming soon.
          See https://github.com/Toloka/tolokaforge for more information.
          """

          __version__ = "0.0.2"
          STUB_EOF

          cat > pyproject.toml << 'TOML_EOF'
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"

          [project]
          name = "tolokaforge"
          version = "0.0.2"
          description = "Tolokaforge - LLM Tool-Use Benchmarking Harness"
          readme = "README.md"
          requires-python = ">=3.10"
          license = {text = "Apache-2.0"}
          authors = [
              {name = "Tolokaforge Contributors"},
          ]
          keywords = [
              "llm",
              "benchmark",
              "tool-use",
              "agents",
              "evaluation",
              "litellm",
              "testing",
          ]
          classifiers = [
              "Development Status :: 1 - Planning",
              "Intended Audience :: Developers",
              "Intended Audience :: Science/Research",
              "License :: OSI Approved :: Apache Software License",
              "Operating System :: OS Independent",
              "Programming Language :: Python :: 3",
              "Programming Language :: Python :: 3.10",
              "Programming Language :: Python :: 3.11",
              "Programming Language :: Python :: 3.12",
              "Topic :: Scientific/Engineering :: Artificial Intelligence",
              "Topic :: Software Development :: Testing",
          ]
          dependencies = []

          [project.urls]
          Homepage = "https://github.com/Toloka/tolokaforge"
          Repository = "https://github.com/Toloka/tolokaforge"
          Documentation = "https://github.com/Toloka/tolokaforge/tree/main/docs"
          Issues = "https://github.com/Toloka/tolokaforge/issues"

          [tool.hatch.build.targets.wheel]
          packages = ["tolokaforge"]
          TOML_EOF

          # Remove uv.lock to avoid workspace resolution
          rm -f uv.lock

          echo "Stub package prepared:"
          cat pyproject.toml
          echo "---"
          cat tolokaforge/__init__.py

      - name: Build package
        run: |
          if [ "${{ github.event.inputs.stub }}" = "true" ]; then
            uv build --wheel
          else
            uv build
          fi

      - name: Verify package contents
        run: |
          echo "=== Built artifacts ==="
          ls -lh dist/
          echo ""
          echo "=== Wheel contents ==="
          uv run python -c "
          import zipfile, sys
          for f in __import__('pathlib').Path('dist').glob('*.whl'):
              print(f'--- {f.name} ---')
              with zipfile.ZipFile(f) as zf:
                  for name in sorted(zf.namelist()):
                      print(f'  {name}')
          "

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tolokaforge-dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: tolokaforge-dist
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f

      - name: Publish to TestPyPI
        run: uv publish dist/* --publish-url https://test.pypi.org/legacy/ --trusted-publishing always

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: tolokaforge-dist
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f

      - name: Publish to PyPI
        run: uv publish dist/* --trusted-publishing always

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: tolokaforge-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
